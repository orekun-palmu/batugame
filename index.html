<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>罰ゲームルーレット(リセット・手動調整機能付き)</title>
    <style>
        :root {
            /* キュート・パステル パレット */
            --pastel-red: #ff8fab;
            --pastel-red-glow: rgba(255, 143, 171, 0.45);
            --pastel-red-dark: #e2738f;
            --lavender: #c9a8ff;
            --cream: #fff4e0;
            --peach: #ffb4a2;
            --bg-color: #1c1620;
            --container-bg: #2a2032;
            --border-color: rgba(255, 143, 171, 0.22);
            --danger-color: #ff8a7a;
            --tab-inactive: #352a3d;
            --success-color: #a8e6cf;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Maru Gothic ProN', 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background: radial-gradient(circle at 50% -10%, #3a2a45 0%, var(--bg-color) 55%);
            color: #f8f0f5;
            margin: 0;
            padding: 10px 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: var(--container-bg);
            padding: 16px 12px;
            border-radius: 18px;
            border: 1px solid var(--border-color);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.45), 0 0 24px rgba(255, 143, 171, 0.08);
            margin-bottom: 16px;
            overflow: hidden;
        }

        h1 {
            font-size: clamp(15px, 4.5vw, 20px);
            text-align: center;
            color: #fff;
            margin-top: 0;
            margin-bottom: 16px;
            font-weight: bold;
            letter-spacing: 0.04em;
            text-shadow: 0 0 10px var(--pastel-red-glow), 0 0 18px rgba(201, 168, 255, 0.25);
            line-height: 1.3;
        }

        /* タブメニュー */
        .tab-menu {
            display: flex;
            gap: 4px;
            margin-bottom: 16px;
            border-bottom: 2px solid #3d2f47;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .tab-btn {
            flex: 1;
            background: var(--tab-inactive);
            color: #b8a8c0;
            border: none;
            padding: 10px 6px;
            font-size: clamp(11px, 3.2vw, 14px);
            font-weight: bold;
            border-radius: 10px 10px 0 0;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            white-space: nowrap;
            min-width: 0;
            -webkit-tap-highlight-color: transparent;
        }

        .tab-btn:hover { color: #fff; }

        .tab-btn.active {
            background: var(--pastel-red);
            color: #3a1f2a;
            box-shadow: 0 0 12px var(--pastel-red-glow);
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* メインレイアウト */
        .main-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        @media (max-width: 640px) {
            .main-layout {
                grid-template-columns: 1fr;
                gap: 14px;
            }
        }

        /* ルーレット盤エリア */
        .roulette-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
        }

        .canvas-container {
            position: relative;
            width: 100%;
            max-width: min(300px, 80vw);
            aspect-ratio: 1 / 1;
            margin: 0 auto 16px;
        }

        /* 上部の固定矢印 */
        .roulette-arrow {
            position: absolute;
            top: -13px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 13px solid transparent;
            border-right: 13px solid transparent;
            border-top: 22px solid #fff;
            z-index: 10;
            filter: drop-shadow(0 2px 8px rgba(255,143,171,0.5));
        }

        canvas {
            width: 100% !important;
            height: 100% !important;
            border-radius: 50%;
            display: block;
            box-shadow: 0 0 30px rgba(0,0,0,0.5), 0 0 16px rgba(255,143,171,0.18);
        }

        /* 操作系 */
        .control-panel {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }

        .setting-box {
            background: #35293f;
            padding: 10px 12px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.06);
        }

        .setting-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 13px;
            gap: 8px;
        }
        
        .setting-row span { line-height: 1.4; }

        /* トグルスイッチ */
        .switch {
            position: relative;
            display: inline-block;
            width: 46px;
            height: 24px;
            flex-shrink: 0;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #46384f;
            transition: .2s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px; width: 16px;
            left: 4px; bottom: 4px;
            background-color: #fff4e0;
            transition: .2s;
            border-radius: 50%;
        }

        input:checked + .slider { background: linear-gradient(135deg, var(--pastel-red), var(--lavender)); }
        input:checked + .slider:before {
            transform: translateX(22px);
            background-color: #3a1f2a;
        }

        .btn-start {
            width: 100%;
            padding: 13px 10px;
            font-size: clamp(14px, 3.8vw, 16px);
            font-weight: bold;
            background: linear-gradient(135deg, var(--pastel-red), var(--lavender));
            color: #3a1f2a;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 16px var(--pastel-red-glow);
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-start:hover:not(:disabled) {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }

        .btn-start:disabled {
            background: #46384f !important;
            color: #877a8e !important;
            cursor: not-allowed;
            box-shadow: none !important;
        }

        /* 追加式の記入欄 */
        .inputs-panel {
            background: #35293f;
            padding: 12px 10px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.06);
            display: flex;
            flex-direction: column;
        }

        .inputs-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 14px;
            font-weight: bold;
        }

        .input-scroll-area {
            overflow-y: auto;
            flex: 1;
            max-height: 360px;
            padding-right: 2px;
            margin-bottom: 10px;
            -webkit-overflow-scrolling: touch;
        }

        @media (max-width: 640px) {
            .input-scroll-area { max-height: none; }
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px dashed #4f3f5a;
            width: 100%;
        }

        .input-top-row {
            display: flex;
            align-items: center;
            gap: 6px;
            width: 100%;
            min-width: 0;
        }

        .input-num {
            font-size: 12px;
            color: #b8a8c0;
            width: 18px;
            text-align: right;
            flex-shrink: 0;
        }

        .penalty-select, .penalty-input, .preset-num-input, .preset-unit-select {
            background: #1c1620;
            border: 1px solid #4f3f5a;
            color: #fff;
            padding: 8px 6px;
            border-radius: 10px;
            font-size: 13px;
            min-width: 0;
            max-width: 100%;
        }

        .penalty-select {
            flex: 1;
            cursor: pointer;
        }

        .penalty-input {
            flex: 1.4;
            width: 100%;
        }

        .preset-num-input {
            flex: 0.8;
            text-align: center;
            width: 100%;
        }

        .preset-unit-select {
            flex: 0.6;
            cursor: pointer;
        }

        .penalty-input:focus, .penalty-select:focus, .preset-num-input:focus, .preset-unit-select:focus {
            border-color: var(--pastel-red);
            outline: none;
            box-shadow: 0 0 6px var(--pastel-red-glow);
        }

        /* 確率入力欄 */
        .prob-wrap {
            display: flex;
            align-items: center;
            gap: 2px;
            flex-shrink: 0;
        }

        .prob-input {
            background: #1c1620;
            border: 1px solid #4f3f5a;
            color: #fff;
            padding: 8px 4px;
            border-radius: 10px;
            font-size: 13px;
            width: 52px;
            text-align: center;
            flex-shrink: 0;
        }

        .prob-input:focus {
            border-color: var(--pastel-red);
            outline: none;
            box-shadow: 0 0 6px var(--pastel-red-glow);
        }

        .prob-percent {
            font-size: 12px;
            color: #b8a8c0;
            flex-shrink: 0;
        }

        .btn-delete {
            background: none;
            border: 1px solid #5a4a64;
            color: #c4b4cc;
            padding: 7px 10px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            flex-shrink: 0;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-delete:hover {
            border-color: var(--danger-color);
            color: var(--danger-color);
        }

        /* プリセット下段行 */
        .preset-sub-row {
            display: flex;
            gap: 6px;
            margin-left: 24px;
            align-items: center;
            flex-wrap: wrap;
            width: calc(100% - 24px);
            min-width: 0;
        }

        .preset-sub-row > * {
            min-width: 0;
            flex-shrink: 1;
        }

        .food-name-input {
            background: #1c1620;
            border: 1px solid #6c587b;
            color: #fff;
            padding: 6px 8px;
            border-radius: 8px;
            font-size: 13px;
            flex: 1;
            min-width: 50px;
            max-width: 100%;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
            width: 100%;
        }

        .btn-action {
            flex: 1;
            padding: 11px 6px;
            font-size: clamp(12px, 3.5vw, 14px);
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            border: none;
            text-align: center;
            white-space: nowrap;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-add {
            background-color: #3a2c44;
            color: var(--pastel-red);
            border: 1px solid var(--pastel-red);
        }
        .btn-add:hover:not(:disabled) {
            background: linear-gradient(135deg, var(--pastel-red), var(--lavender));
            color: #3a1f2a;
        }
        .btn-add:disabled {
            border-color: #4f3f5a;
            color: #877a8e;
            cursor: not-allowed;
        }

        .btn-clear {
            background-color: transparent;
            color: var(--danger-color);
            border: 1px solid var(--danger-color);
        }
        .btn-clear:hover {
            background-color: var(--danger-color);
            color: #3a1f2a;
        }

        /* 統計・ログタブレイアウト */
        .stats-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
        }
        .stats-layout .stats-box:last-child {
            grid-column: 1 / -1;
        }

        @media (max-width: 600px) {
            .stats-layout {
                grid-template-columns: 1fr;
            }
            .stats-layout .stats-box:last-child {
                grid-column: auto;
            }
        }

        .stats-box {
            background: #35293f;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px;
            padding: 12px;
            max-height: 380px;
            overflow-y: auto;
            width: 100%;
            -webkit-overflow-scrolling: touch;
        }

        .stats-box h3 {
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 14px;
            border-bottom: 1px solid #4f3f5a;
            padding-bottom: 6px;
            color: #fff;
        }

        .stats-list, .log-list {
            list-style: none;
            padding: 0;
            margin: 0;
            font-size: 13px;
        }

        .stats-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px dashed #4f3f5a;
            gap: 8px;
            flex-wrap: wrap;
        }

        .cumulative-group-item {
            border-bottom: 1px solid #4f3f5a;
            padding: 8px 0;
        }
        .cumulative-main {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
        }

        /* 手動調整フォームのスタイル */
        .adjustment-panel {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-top: 6px;
            background: #1c1620;
            padding: 6px;
            border-radius: 8px;
            width: 100%;
        }
        .adj-input {
            background: #2a2032;
            border: 1px solid #4f3f5a;
            color: #fff;
            padding: 4px;
            border-radius: 6px;
            font-size: 12px;
            width: 50px;
            text-align: center;
        }
        .adj-select {
            background: #2a2032;
            border: 1px solid #4f3f5a;
            color: #fff;
            padding: 4px;
            border-radius: 6px;
            font-size: 11px;
            cursor: pointer;
        }
        .btn-adj {
            padding: 4px 8px;
            font-size: 11px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            border: none;
        }
        .btn-adj-plus { background-color: #3d5a45; color: var(--success-color); }
        .btn-adj-minus { background-color: #5a3434; color: var(--danger-color); }

        .log-item {
            padding: 6px 0;
            color: #d8c8e0;
            border-bottom: 1px dashed #4f3f5a;
            font-size: 12px;
            word-break: break-all;
        }

        /* ポップアップ表示用オーバーレイ (結果表示用) */
        .result-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s;
            padding: 16px;
        }
        .result-overlay.active {
            visibility: visible;
            opacity: 1;
        }
        .result-card {
            background: var(--container-bg);
            border: 2px solid var(--pastel-red);
            padding: 24px 18px;
            border-radius: 20px;
            text-align: center;
            max-width: 440px;
            width: 100%;
            box-shadow: 0 0 36px var(--pastel-red-glow);
            position: relative;
            overflow: hidden;
        }
        .result-card h2 {
            margin: 0 0 12px 0;
            font-size: 14px;
            color: #c9a8ff;
            letter-spacing: 0.1em;
        }
        .result-text {
            font-size: clamp(18px, 5vw, 24px);
            font-weight: bold;
            color: #fff;
            margin-bottom: 20px;
            word-break: break-all;
            text-shadow: 0 0 10px rgba(255,255,255,0.25);
            line-height: 1.4;
        }
        .btn-close-result {
            background: linear-gradient(135deg, var(--pastel-red), var(--lavender));
            color: #3a1f2a;
            border: none;
            padding: 12px 30px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            position: relative;
            z-index: 2;
            font-size: 14px;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-close-result:hover { filter: brightness(1.1); }

        /* 結果ポップアップ用の紙吹雪パーティクル */
        .confetti-piece {
            position: absolute;
            top: -10%;
            border-radius: 2px;
            opacity: 0.9;
            animation: confetti-fall linear forwards;
            pointer-events: none;
            z-index: 1;
        }
        @keyframes confetti-fall {
            to { transform: translateY(420px) rotate(540deg); opacity: 0; }
        }

        /* カスタムモーダル（リセット選択用） */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s;
            padding: 16px;
        }
        .modal.active { visibility: visible; opacity: 1; }
        .modal-content {
            background: var(--container-bg);
            border: 1px solid var(--danger-color);
            padding: 24px 18px;
            border-radius: 18px;
            max-width: 460px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            text-align: center;
            box-shadow: 0 0 24px rgba(255, 138, 122, 0.25);
        }
        .modal h2 { margin-top: 0; font-size: 17px; color: var(--danger-color); }
        .modal p { font-size: 14px; line-height: 1.5; margin-bottom: 20px; }
        .btn-modal-confirm {
            background: var(--danger-color);
            color: #3a1f2a;
            border: none;
            padding: 12px 20px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            width: 100%;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-modal-confirm:hover { background: #ffb4a2; }
    </style>
</head>
<body>

<div class="container">
    <h1>💀 罰ゲームルーレット<br><span style="font-size: 0.8em; font-weight: normal;">(リセット・手動調整機能付き)</span></h1>
    
    <div class="tab-menu">
        <button class="tab-btn active" onclick="switchTab('main-tab', this)">メインルーレット</button>
        <button class="tab-btn" onclick="switchTab('stats-tab', this)">データ・履歴ログ</button>
    </div>

    <div id="main-tab" class="tab-content active">
        <div class="main-layout">
            
            <div class="roulette-wrapper">
                <div class="canvas-container">
                    <div class="roulette-arrow"></div>
                    <canvas id="rouletteCanvas" width="340" height="340"></canvas>
                </div>
                
                <div class="control-panel">
                    <div class="setting-box">
                        <div class="setting-row">
                            <span>🔄 リセット項目を混ぜる<br><small style="color: #b8a8c0;">確率は下で自由に設定できます</small></span>
                            <label class="switch">
                                <input type="checkbox" id="resetToggle" checked onchange="saveToggleSetting(); syncRouletteWheel(); updateResetProbVisibility();">
                                <span class="slider"></span>
                            </label>
                        </div>
                        <div class="setting-row" id="resetProbRow" style="margin-top:8px;">
                            <span>リセットの確率</span>
                            <div class="prob-wrap">
                                <input type="number" id="resetProbInput" class="prob-input" min="0" step="0.1" value="5" oninput="saveResetProb(); syncRouletteWheel();">
                                <span class="prob-percent">%</span>
                            </div>
                        </div>
                    </div>
                    <button class="btn-start" id="btnStart" onclick="spinWheel()">ルーレットを回す！</button>
                    <button class="btn-start" id="btnStart10" onclick="startMultiSpin(10)" style="margin-top:4px; background: linear-gradient(135deg, var(--lavender), var(--pastel-red));">🔥 10連続で回す！</button>
                    <div id="multiSpinStatus" style="display:none; text-align:center; font-size:13px; color:#c9a8ff; margin-top:4px;"></div>
                </div>
            </div>

            <div class="inputs-panel">
                <div class="inputs-header">
                    <span>📝 項目リスト (<span id="currentCount">0</span>/50)</span>
                    <span id="totalProbDisplay" style="font-size:12px; color:#b8a8c0;">合計: 0%</span>
                </div>
                
                <div class="input-scroll-area" id="inputContainer">
                </div>

                <div class="action-buttons">
                    <button class="btn-action btn-add" id="btnAddField" onclick="addField()">＋ 項目を追加</button>
                    <button class="btn-action btn-clear" onclick="clearAllFields()">すべてクリア</button>
                </div>
            </div>

        </div>
    </div>

    <div id="stats-tab" class="tab-content">
        <div class="stats-actions" style="margin-bottom: 12px; text-align: right;">
            <button class="btn-action btn-clear" style="flex: none; padding: 8px 16px;" onclick="manualResetCumulative()">🔄 累計をリセット</button>
        </div>
        <div class="stats-layout">
            <div class="stats-box">
                <h3>📊 累計当選数</h3>
                <div id="statsList" class="stats-list">まだ当選データがありません</div>
            </div>
            <div class="stats-box">
                <h3>🧮 累計値 (手動足し引き調整可)</h3>
                <div id="cumulativeList" class="stats-list">まだ累計データがありません</div>
            </div>
            <div class="stats-box">
                <h3>📜 履歴ログ</h3>
                <div id="logList" class="log-list">履歴はありません</div>
            </div>
        </div>
    </div>
</div>

<div class="result-overlay" id="resultOverlay">
    <div class="result-card">
        <h2>抽選結果</h2>
        <div class="result-text" id="resultText">---</div>
        <button class="btn-close-result" onclick="closeResultPopup()">閉じる</button>
    </div>
</div>

<div class="modal" id="resetModal">
    <div class="modal-content">
        <h2>🔄 リセット条件発動！</h2>
        <p>「リセット」が当選しました。<br>累計値をすべて0にリセットします。</p>
        <button class="btn-modal-confirm" onclick="executeReset()">累計値をリセットして閉じる</button>
    </div>
</div>

<script>
let itemsList = []; 
let stats = {};
let logs = [];
let cumulativeLogs = []; 

// ルーレット制御用変数
const canvas = document.getElementById('rouletteCanvas');
const ctx = canvas.getContext('2d');
let currentAngle = 0; 
let isSpinning = false;
let currentPool = []; 

// パステル系のグラデーション用シードカラー
const colors = ['#4a3a56', '#5a3f5e', '#3f3a52', '#4f3a4a', '#3a3a52', '#523f4f'];

// プリセット用データ定義
const PRESET_OPTIONS = ['ご自愛', '禁煙', '禁酒', '〇〇を食べる'];
const COUNT_PRESETS = ['1個', '2個', '3個', '5個', '10個'];

window.onload = function() {
    loadSavedData();
    if(itemsList.length === 0) {
        addField();
        addField();
        addField();
    }
    syncRouletteWheel();
};

// タブ切り替え
function switchTab(tabId, btn) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
    
    document.getElementById(tabId).classList.add('active');
    btn.classList.add('active');

    if(tabId === 'main-tab') {
        syncRouletteWheel();
    }
}

// 項目を追加 (最大50個)
function addField() {
    if (itemsList.length >= 50) return;

    const id = Date.now() + Math.random();
    itemsList.push({ 
        id: id, 
        mode: 'custom', 
        presetType: 'ご自愛', 
        value: '', // 自由入力時は文字列、プリセット時は数値(文字列)として扱う
        presetUnit: '時間', // 時間指定用の単位初期値
        foodName: 'プリン',
        prob: 10
    });

    renderFields();
    saveItems();
    syncRouletteWheel();
}

// 項目を削除
function deleteField(id) {
    itemsList = itemsList.filter(item => item.id !== id);
    renderFields();
    saveItems();
    syncRouletteWheel();
}

// アイテムのオブジェクトから実際の表示テキストを生成する関数
function getItemText(item) {
    if (item.mode === 'custom') {
        return item.value;
    } else {
        if (item.presetType === '〇〇を食べる') {
            return `${item.foodName || '〇〇'}を${item.value}食べる`;
        } else {
            // 自由指定された数値と単位を結合
            const num = item.value || '1';
            const unit = item.presetUnit || '時間';
            return `${item.presetType}${num}${unit}`;
        }
    }
}

// 記入欄のレンダリング
function renderFields() {
    const container = document.getElementById('inputContainer');
    container.innerHTML = '';

    itemsList.forEach((item, index) => {
        const group = document.createElement('div');
        group.className = 'input-group';

        const topRow = document.createElement('div');
        topRow.className = 'input-top-row';

        const num = document.createElement('span');
        num.className = 'input-num';
        num.innerText = index + 1;
        topRow.appendChild(num);

        const modeSelect = document.createElement('select');
        modeSelect.className = 'penalty-select';
        
        const optCustom = document.createElement('option');
        optCustom.value = 'custom';
        optCustom.innerText = '✍️ 自由入力';
        if(item.mode === 'custom') optCustom.selected = true;
        modeSelect.appendChild(optCustom);

        PRESET_OPTIONS.forEach(p => {
            const opt = document.createElement('option');
            opt.value = p;
            opt.innerText = `🎁 ${p}`;
            if(item.mode === 'preset' && item.presetType === p) opt.selected = true;
            modeSelect.appendChild(opt);
        });

        modeSelect.onchange = function(e) {
            const val = e.target.value;
            if(val === 'custom') {
                item.mode = 'custom';
                item.value = '';
            } else {
                item.mode = 'preset';
                item.presetType = val;
                if(val === '〇〇を食べる') {
                    item.value = COUNT_PRESETS[0];
                } else {
                    // 時間系の初期設定値
                    item.value = '1'; 
                    item.presetUnit = '時間';
                }
            }
            renderFields();
            saveItems();
            syncRouletteWheel();
        };
        topRow.appendChild(modeSelect);

        if (item.mode === 'custom') {
            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'penalty-input';
            input.value = item.value;
            input.placeholder = '空欄（はずれ）';
            input.oninput = function(e) {
                item.value = e.target.value;
                saveItems();
                syncRouletteWheel();
            };
            topRow.appendChild(input);
        } else if (item.presetType === '〇〇を食べる') {
            // 個数選択
            const valueSelect = document.createElement('select');
            valueSelect.className = 'penalty-input';
            COUNT_PRESETS.forEach(v => {
                const opt = document.createElement('option');
                opt.value = v;
                opt.innerText = v;
                if(item.value === v) opt.selected = true;
                valueSelect.appendChild(opt);
            });
            valueSelect.onchange = function(e) {
                item.value = e.target.value;
                saveItems();
                syncRouletteWheel();
            };
            topRow.appendChild(valueSelect);
        } else {
            // 時間自由入力用 (数値入力 + 単位セレクト)
            const numInput = document.createElement('input');
            numInput.type = 'number';
            numInput.className = 'preset-num-input';
            numInput.min = '0';
            numInput.step = 'any';
            numInput.value = item.value || '1';
            numInput.oninput = function(e) {
                item.value = e.target.value;
                saveItems();
                syncRouletteWheel();
            };

            const unitSelect = document.createElement('select');
            unitSelect.className = 'preset-unit-select';
            ['時間', '日', '分'].forEach(u => {
                const opt = document.createElement('option');
                opt.value = u;
                opt.innerText = u;
                if((item.presetUnit || '時間') === u) opt.selected = true;
                unitSelect.appendChild(opt);
            });
            unitSelect.onchange = function(e) {
                item.presetUnit = e.target.value;
                saveItems();
                syncRouletteWheel();
            };

            topRow.appendChild(numInput);
            topRow.appendChild(unitSelect);
        }

        const probWrap = document.createElement('div');
        probWrap.className = 'prob-wrap';

        const probInput = document.createElement('input');
        probInput.type = 'number';
        probInput.className = 'prob-input';
        probInput.min = '0';
        probInput.step = '0.1';
        probInput.value = (typeof item.prob === 'number') ? item.prob : 10;
        probInput.oninput = function(e) {
            let v = parseFloat(e.target.value);
            if (isNaN(v) || v < 0) v = 0;
            item.prob = v;
            saveItems();
            syncRouletteWheel();
        };
        probWrap.appendChild(probInput);

        const probPercent = document.createElement('span');
        probPercent.className = 'prob-percent';
        probPercent.innerText = '%';
        probWrap.appendChild(probPercent);

        topRow.appendChild(probWrap);

        const btnDel = document.createElement('button');
        btnDel.className = 'btn-delete';
        btnDel.innerText = '×';
        btnDel.onclick = function() { deleteField(item.id); };
        topRow.appendChild(btnDel);

        group.appendChild(topRow);

        if (item.mode === 'preset' && item.presetType === '〇〇を食べる') {
            const subRow = document.createElement('div');
            subRow.className = 'preset-sub-row';
            
            const labelText = document.createElement('span');
            labelText.style.fontSize = '12px';
            labelText.style.color = '#b8a8c0';
            labelText.innerText = '対象 ➔';
            subRow.appendChild(labelText);

            const foodInput = document.createElement('input');
            foodInput.type = 'text';
            foodInput.className = 'food-name-input';
            foodInput.value = item.foodName || 'プリン';
            foodInput.placeholder = 'プリン';
            foodInput.oninput = function(e) {
                item.foodName = e.target.value;
                saveItems();
                syncRouletteWheel();
            };
            subRow.appendChild(foodInput);

            const tailText = document.createElement('span');
            tailText.style.fontSize = '12px';
            tailText.style.color = '#b8a8c0';
            tailText.innerText = 'を食べる';
            subRow.appendChild(tailText);

            group.appendChild(subRow);
        }

        container.appendChild(group);
    });

    document.getElementById('currentCount').innerText = itemsList.length;
    document.getElementById('btnAddField').disabled = itemsList.length >= 50;
}

function clearAllFields() {
    if(confirm('すべての記入欄を削除してもよろしいですか？')) {
        itemsList = [];
        renderFields();
        saveItems();
        syncRouletteWheel();
    }
}

function syncRouletteWheel() {
    currentPool = [];
    
    itemsList.forEach((item) => {
        const val = getItemText(item).trim();
        const w = parseFloat(item.prob);
        const weight = (isNaN(w) || w < 0) ? 0 : w;
        if (val !== '') {
            currentPool.push({ type: 'penalty', name: val, originId: item.id, weight: weight });
        } else {
            currentPool.push({ type: 'miss', name: '❌ はずれ', weight: weight });
        }
    });

    if (currentPool.length === 0) {
        currentPool.push({ type: 'miss', name: '❌ はずれ', weight: 1 });
    }

    const isResetAvailable = document.getElementById('resetToggle').checked;
    if (isResetAvailable) {
        const rw = parseFloat(document.getElementById('resetProbInput').value);
        const resetWeight = (isNaN(rw) || rw < 0) ? 0 : rw;
        currentPool.push({ type: 'reset', name: '🔄 リセット発動！', weight: resetWeight });
    }

    updateTotalProbDisplay();
    drawWheel(currentAngle);
}

// 各セグメントの重み（確率）から実際の角度範囲を計算
function computeSegments() {
    const rawWeights = currentPool.map(seg => (typeof seg.weight === 'number' && seg.weight > 0) ? seg.weight : 0);
    let totalWeight = rawWeights.reduce((a, b) => a + b, 0);
    let weights = rawWeights;

    // すべて0（未設定）の場合は均等割りにフォールバック
    if (totalWeight <= 0) {
        weights = currentPool.map(() => 1);
        totalWeight = currentPool.length;
    }

    let cursor = 0;
    return currentPool.map((seg, i) => {
        const arc = (weights[i] / totalWeight) * 2 * Math.PI;
        const segment = { ...seg, start: cursor, arc: arc };
        cursor += arc;
        return segment;
    });
}

// 項目リストの確率合計を表示
function updateTotalProbDisplay() {
    const isResetAvailable = document.getElementById('resetToggle').checked;
    let total = itemsList.reduce((sum, item) => {
        const w = parseFloat(item.prob);
        return sum + ((isNaN(w) || w < 0) ? 0 : w);
    }, 0);
    if (isResetAvailable) {
        const rw = parseFloat(document.getElementById('resetProbInput').value);
        total += (isNaN(rw) || rw < 0) ? 0 : rw;
    }

    const el = document.getElementById('totalProbDisplay');
    const rounded = Math.round(total * 10) / 10;
    el.innerText = `合計: ${rounded}%`;
    el.style.color = Math.abs(total - 100) < 0.05 ? '#a8e6cf' : '#ffb4a2';
}

function drawWheel(angle) {
    const segments = computeSegments();
    const radius = canvas.width / 2;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    segments.forEach((seg, i) => {
        if (seg.arc <= 0.0005) return; 

        const segmentAngle = angle + seg.start;

        ctx.beginPath();
        if (seg.type === 'reset') {
            ctx.fillStyle = '#ffb4a2'; 
        } else if (seg.type === 'miss') {
            ctx.fillStyle = '#3a2c44'; 
        } else {
            ctx.fillStyle = colors[i % colors.length];
        }
        
        ctx.moveTo(radius, radius);
        ctx.arc(radius, radius, radius - 5, segmentAngle, segmentAngle + seg.arc);
        ctx.lineTo(radius, radius);
        ctx.fill();
        
        ctx.strokeStyle = 'rgba(255, 143, 171, 0.18)';
        ctx.lineWidth = 1;
        ctx.stroke();

        if (seg.arc > 0.12) {
            ctx.save();
            if (seg.type === 'reset') {
                ctx.fillStyle = '#3a1f2a';
            } else if (seg.type === 'miss') {
                ctx.fillStyle = '#8a7a96';
            } else {
                ctx.fillStyle = '#ffe3ea';
            }
            
            ctx.translate(radius, radius);
            ctx.rotate(segmentAngle + seg.arc / 2);
            ctx.font = 'bold 12px sans-serif';
            ctx.textAlign = 'right';
            
            let text = seg.name;
            if(text.length > 12) text = text.substring(0, 11) + '...';
            
            ctx.fillText(text, radius - 20, 5);
            ctx.restore();
        }
    });

    ctx.beginPath();
    ctx.arc(radius, radius, 15, 0, 2 * Math.PI);
    ctx.fillStyle = '#fff4e0';
    ctx.strokeStyle = varColor('--pastel-red');
    ctx.lineWidth = 3;
    ctx.fill();
    ctx.stroke();
}

function varColor(varName) {
    return getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
}

let multiSpinRemaining = 0;
let multiSpinTotal = 0;
let resetPending = false;

function startMultiSpin(count) {
    if (isSpinning || multiSpinRemaining > 0) return;
    multiSpinRemaining = count;
    multiSpinTotal = count;
    document.getElementById('btnStart10').disabled = true;
    updateMultiSpinStatus();
    spinWheel();
}

function updateMultiSpinStatus() {
    const statusEl = document.getElementById('multiSpinStatus');
    if (multiSpinRemaining > 0) {
        statusEl.style.display = 'block';
        statusEl.innerText = `🎯 残り ${multiSpinRemaining} 回`;
    } else {
        statusEl.style.display = 'none';
    }
}

function pickWeightedIndex(segments) {
    const totalArc = segments.reduce((sum, seg) => sum + seg.arc, 0);
    let r = Math.random() * totalArc;
    for (let i = 0; i < segments.length; i++) {
        if (r < segments[i].arc) return i;
        r -= segments[i].arc;
    }
    return segments.length - 1;
}

function spinWheel() {
    if (isSpinning) return;

    isSpinning = true;
    document.getElementById('btnStart').disabled = true;
    document.getElementById('btnStart10').disabled = true;

    const segments = computeSegments();
    const targetIndex = pickWeightedIndex(segments);
    const seg = segments[targetIndex];
    
    const margin = seg.arc * 0.15;
    const offsetInSegment = margin + Math.random() * (seg.arc - margin * 2 > 0 ? seg.arc - margin * 2 : seg.arc);
    const targetLocalAngle = seg.start + offsetInSegment;

    const targetAngle = -Math.PI / 2 - targetLocalAngle;
    const finalAngle = targetAngle - (Math.PI * 2 * 6); 
    
    let startTimestamp = null;
    const duration = multiSpinRemaining > 0 ? 1200 : 4000; 

    function animate(timestamp) {
        if (!startTimestamp) startTimestamp = timestamp;
        const elapsed = timestamp - startTimestamp;
        const progress = Math.min(elapsed / duration, 1);

        const easeOut = 1 - Math.pow(1 - progress, 3);
        
        currentAngle = easeOut * finalAngle;
        drawWheel(currentAngle);

        if (progress < 1) {
            requestAnimationFrame(animate);
        } else {
            isSpinning = false;
            document.getElementById('btnStart').disabled = false;
            if (multiSpinRemaining === 0) document.getElementById('btnStart10').disabled = false;
            
            const result = currentPool[targetIndex];
            showResultPopup(result);
            processResult(result);
        }
    }

    requestAnimationFrame(animate);
}

function showResultPopup(result) {
    const overlay = document.getElementById('resultOverlay');
    const txt = document.getElementById('resultText');
    const titleEl = document.querySelector('.result-card h2');
    txt.innerText = result.name;

    if (multiSpinRemaining > 0) {
        const total = multiSpinTotal;
        const current = total - multiSpinRemaining + 1;
        titleEl.innerText = `抽選結果（${current}/${total}回目）`;
    } else {
        titleEl.innerText = '抽選結果';
    }

    overlay.classList.add('active');
    spawnConfetti();
}

function spawnConfetti() {
    const card = document.querySelector('.result-card');
    card.querySelectorAll('.confetti-piece').forEach(el => el.remove());

    const confettiColors = ['#ff8fab', '#c9a8ff', '#fff4e0', '#ffb4a2', '#a8e6cf'];
    const pieceCount = 24;

    for (let i = 0; i < pieceCount; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        const size = 6 + Math.random() * 6;
        piece.style.width = `${size}px`;
        piece.style.height = `${size * 0.4}px`;
        piece.style.left = `${Math.random() * 100}%`;
        piece.style.background = confettiColors[Math.floor(Math.random() * confettiColors.length)];
        piece.style.animationDuration = `${1.4 + Math.random() * 1.2}s`;
        piece.style.animationDelay = `${Math.random() * 0.3}s`;
        card.appendChild(piece);
    }
}

const TIME_UNIT_TO_HOURS = {
    'h': 1, '時間': 1,
    '日': 24,
    '分': 1 / 60, 'm': 1 / 60, 'min': 1 / 60
};

// 表記ブレに対応して数値を抽出するロジック
function parseAmount(text) {
    const normalized = text
        .replace(/[ｈＨ]/g, 'h')
        .replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0));
    
    const cleanText = normalized.replace('を食べる', '');
    // 小数点「\d+(?:\.\d+)?」にも一致するように正規表現を維持
    const match = cleanText.match(/(\d+(?:\.\d+)?)\s*(時間|日|分|h|min|m|回|個|点|本|枚|杯|分間)/);
    if (!match) return null;
    const num = parseFloat(match[1]);
    let unit = match[2];
    if(unit === '分間') unit = '分';
    
    const isTime = Object.prototype.hasOwnProperty.call(TIME_UNIT_TO_HOURS, unit);
    
    let label = normalized.replace(match[0], '').replace('を食べる', '').trim();
    if (!label) label = normalized;
    return { num, unit, isTime, label };
}

function closeResultPopup() {
    document.getElementById('resultOverlay').classList.remove('active');
    if (resetPending) {
        resetPending = false;
        return; 
    }
    advanceMultiSpin();
}

function advanceMultiSpin() {
    if (multiSpinRemaining > 0) {
        multiSpinRemaining--;
        updateMultiSpinStatus();
        if (multiSpinRemaining > 0) {
            setTimeout(() => spinWheel(), 400);
        } else {
            multiSpinTotal = 0;
            document.getElementById('btnStart10').disabled = false;
        }
    }
}

function processResult(result) {
    stats[result.name] = (stats[result.name] || 0) + 1;
    localStorage.setItem('canvasRouletteStats_v3', JSON.stringify(stats));

    const now = new Date();
    const timeStr = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;
    logs.unshift(`[${timeStr}] ${result.name}`);
    if (logs.length > 100) logs.pop();
    localStorage.setItem('canvasRouletteLogs_v3', JSON.stringify(logs));

    if (result.type === 'penalty') {
        const parsed = parseAmount(result.name);
        if (parsed) {
            cumulativeLogs.push({
                id: Date.now() + Math.random(),
                name: result.name,
                num: parsed.num,
                unit: parsed.unit,
                isTime: parsed.isTime,
                label: parsed.label,
                timestamp: timeStr
            });
            localStorage.setItem('canvasCumulativeLogs_v3', JSON.stringify(cumulativeLogs));
        }
    }

    updateStatsDisplay();
    updateLogDisplay();

    if (result.type === 'reset') {
        resetPending = true;
        setTimeout(() => {
            openResetModal();
        }, 600);
    }
}

function openResetModal() {
    const modal = document.getElementById('resetModal');
    modal.classList.add('active');
}

function executeReset() {
    cumulativeLogs = [];
    stats = {};
    localStorage.setItem('canvasCumulativeLogs_v3', JSON.stringify(cumulativeLogs));
    localStorage.setItem('canvasRouletteStats_v3', JSON.stringify(stats));
    updateStatsDisplay();

    document.getElementById('resetModal').classList.remove('active');
    advanceMultiSpin();
}

function manualResetCumulative() {
    if (!confirm('累計当選数と累計値をすべてリセットします。よろしいですか？')) return;

    cumulativeLogs = [];
    stats = {};
    localStorage.setItem('canvasCumulativeLogs_v3', JSON.stringify(cumulativeLogs));
    localStorage.setItem('canvasRouletteStats_v3', JSON.stringify(stats));
    updateStatsDisplay();
}

// 手動調整を適用する関数
function applyAdjustment(label, isPlus) {
    const inputEl = document.getElementById(`adj-input-${label}`);
    const unitEl = document.getElementById(`adj-unit-${label}`);
    if (!inputEl || !unitEl) return;

    const val = parseFloat(inputEl.value);
    if (isNaN(val) || val <= 0) {
        alert('1以上の有効な数値を入力してください。');
        return;
    }

    const unit = unitEl.value;
    const isTime = Object.prototype.hasOwnProperty.call(TIME_UNIT_TO_HOURS, unit);
    const finalNum = isPlus ? val : -val;

    const now = new Date();
    const timeStr = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;

    // 履歴ログにも調整内容を残す
    const logSign = isPlus ? '＋' : '－';
    logs.unshift(`[${timeStr}] 🛠️ 手動調整: ${label} (${logSign}${val}${unit})`);
    localStorage.setItem('canvasRouletteLogs_v3', JSON.stringify(logs));

    // 累計データ配列に調整用レコードを挿入
    cumulativeLogs.push({
        id: Date.now() + Math.random(),
        name: `手動調整 (${logSign}${val}${unit})`,
        num: finalNum,
        unit: unit,
        isTime: isTime,
        label: label,
        timestamp: timeStr
    });

    localStorage.setItem('canvasCumulativeLogs_v3', JSON.stringify(cumulativeLogs));
    updateStatsDisplay();
    updateLogDisplay();
    
    // 入力欄をクリア
    inputEl.value = '';
}

function saveItems() {
    localStorage.setItem('rouletteItemsList_v3', JSON.stringify(itemsList));
}

function saveToggleSetting() {
    const toggle = document.getElementById('resetToggle').checked;
    localStorage.setItem('canvasResetToggle_v3', toggle);
}

function saveResetProb() {
    const val = document.getElementById('resetProbInput').value;
    localStorage.setItem('canvasResetProb_v3', val);
}

function updateResetProbVisibility() {
    const isOn = document.getElementById('resetToggle').checked;
    document.getElementById('resetProbRow').style.display = isOn ? 'flex' : 'none';
}

function loadSavedData() {
    const savedItems = localStorage.getItem('rouletteItemsList_v3');
    if (savedItems) {
        itemsList = JSON.parse(savedItems).map(item => ({
            ...item,
            prob: (typeof item.prob === 'number' && !isNaN(item.prob)) ? item.prob : 10,
            presetUnit: item.presetUnit || '時間'
        }));
        renderFields();
    }

    const savedToggle = localStorage.getItem('canvasResetToggle_v3');
    if (savedToggle !== null) {
        document.getElementById('resetToggle').checked = savedToggle === 'true';
    }

    const savedResetProb = localStorage.getItem('canvasResetProb_v3');
    if (savedResetProb !== null) {
        document.getElementById('resetProbInput').value = savedResetProb;
    }
    updateResetProbVisibility();

    const savedStats = localStorage.getItem('canvasRouletteStats_v3');
    if (savedStats) stats = JSON.parse(savedStats);
    
    const savedLogs = localStorage.getItem('canvasRouletteLogs_v3');
    if (savedLogs) logs = JSON.parse(savedLogs);

    const savedCumulative = localStorage.getItem('canvasCumulativeLogs_v3');
    if (savedCumulative) cumulativeLogs = JSON.parse(savedCumulative);

    updateStatsDisplay();
    updateLogDisplay();
}

function updateStatsDisplay() {
    const container = document.getElementById('statsList');
    const cumulativeContainer = document.getElementById('cumulativeList');
    const filteredStats = Object.entries(stats).filter(([key]) => key !== '❌ はずれ');

    if (filteredStats.length === 0) {
        container.innerText = 'まだ当選データがありません';
    } else {
        container.innerHTML = '';
        filteredStats.forEach(([key, count]) => {
            const item = document.createElement('div');
            item.className = 'stats-item';
            item.innerHTML = `<span>${key}</span><span>${count} 回</span>`;
            container.appendChild(item);
        });
    }

    if (cumulativeLogs.length === 0) {
        cumulativeContainer.innerText = 'まだ累計データがありません';
    } else {
        cumulativeContainer.innerHTML = '';

        const groups = {};
        cumulativeLogs.forEach(l => {
            if (!groups[l.label]) groups[l.label] = [];
            groups[l.label].push(l);
        });

        for (let label in groups) {
            const entries = groups[label];

            // 時間系レコードの計算（手動のマイナス値もそのまま合算される）
            const timeEntries = entries.filter(l => l.isTime);
            const timeTotalHours = timeEntries.reduce((sum, l) => sum + l.num * TIME_UNIT_TO_HOURS[l.unit], 0);

            // 時間系以外の集計
            const otherTotals = {};
            entries.filter(l => !l.isTime).forEach(l => {
                otherTotals[l.unit] = (otherTotals[l.unit] || 0) + l.num;
            });

            let displayStr = '';
            if (timeEntries.length > 0) {
                const totalDisplay = timeTotalHours % 1 === 0 ? timeTotalHours : timeTotalHours.toFixed(2);
                displayStr = `合計 ${totalDisplay} 時間`;
            }
            const otherStrs = Object.entries(otherTotals).map(([unit, num]) => {
                const numDisplay = num % 1 === 0 ? num : num.toFixed(2);
                return `合計 ${numDisplay} ${unit}`;
            });
            if (otherStrs.length > 0) {
                displayStr = displayStr ? `${displayStr}、${otherStrs.join('、')}` : otherStrs.join('、');
            }

            // コンテナ生成
            const groupWrap = document.createElement('div');
            groupWrap.className = 'cumulative-group-item';

            const mainRow = document.createElement('div');
            mainRow.className = 'cumulative-main';
            mainRow.innerHTML = `<span>${label}</span><span>${displayStr}</span>`;
            groupWrap.appendChild(mainRow);

            // 手動プラスマイナス調整用UIを動的配置
            const adjPanel = document.createElement('div');
            adjPanel.className = 'adjustment-panel';

            const isTimeGroup = timeEntries.length > 0 || entries.some(e => Object.prototype.hasOwnProperty.call(TIME_UNIT_TO_HOURS, e.unit));
            
            let unitSelectHtml = '';
            if (isTimeGroup) {
                unitSelectHtml = `
                    <select class="adj-select" id="adj-unit-${label}">
                        <option value="時間">時間</option>
                        <option value="日">日</option>
                        <option value="分">分</option>
                    </select>
                `;
            } else {
                const firstNonTimeUnit = entries.find(l => !l.isTime)?.unit || '個';
                unitSelectHtml = `
                    <select class="adj-select" id="adj-unit-${label}">
                        <option value="${firstNonTimeUnit}">${firstNonTimeUnit}</option>
                    </select>
                `;
            }

            adjPanel.innerHTML = `
                <span style="font-size:11px; color:#b8a8c0; margin-right:2px;">調整:</span>
                <input type="number" class="adj-input" id="adj-input-${label}" placeholder="数値" min="0" step="any">
                ${unitSelectHtml}
                <button class="btn-adj btn-adj-plus" onclick="applyAdjustment('${label}', true)">＋足す</button>
                <button class="btn-adj btn-adj-minus" onclick="applyAdjustment('${label}', false)">－引く</button>
            `;
            groupWrap.appendChild(adjPanel);

            cumulativeContainer.appendChild(groupWrap);
        }
    }
}

function updateLogDisplay() {
    const container = document.getElementById('logList');
    if (logs.length === 0) {
        container.innerText = '履歴はありません';
        return;
    }
    container.innerHTML = '';
    logs.forEach(log => {
        const item = document.createElement('div');
        item.className = 'log-item';
        item.innerText = log;
        container.appendChild(item);
    });
}
</script>
