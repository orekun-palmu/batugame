<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>罰ゲームルーレット(リセット機能付き)</title>
    <style>
        :root {
            /* キュート・パステル パレット */
            --pastel-red: #ff8fab;
            --pastel-red-glow: rgba(255, 143, 171, 0.45);
            --pastel-red-dark: #e2738f;
            --lavender: #c9a8ff;
            --cream: #fff4e0;
            --peach: #ffb4a2;
            --bg-color: #1c1620;
            --container-bg: #2a2032;
            --border-color: rgba(255, 143, 171, 0.22);
            --danger-color: #ff8a7a;
            --tab-inactive: #352a3d;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Maru Gothic ProN', 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background: radial-gradient(circle at 50% -10%, #3a2a45 0%, var(--bg-color) 55%);
            color: #f8f0f5;
            margin: 0;
            padding: 12px; /* スマホ用に外側余白をタイトに */
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: var(--container-bg);
            padding: 20px 15px; /* スマホ用にパディングを最適化 */
            border-radius: 24px;
            border: 1px solid var(--border-color);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.45), 0 0 24px rgba(255, 143, 171, 0.08);
            margin-bottom: 20px;
        }

        h1 {
            font-size: 20px; /* スマホ向けに縮小 */
            text-align: center;
            color: #fff;
            margin-top: 0;
            margin-bottom: 20px;
            font-weight: bold;
            letter-spacing: 0.04em;
            text-shadow: 0 0 10px var(--pastel-red-glow), 0 0 18px rgba(201, 168, 255, 0.25);
            line-height: 1.3;
        }

        /* タブメニュー */
        .tab-menu {
            display: flex;
            gap: 4px;
            margin-bottom: 20px;
            border-bottom: 2px solid #3d2f47;
        }

        .tab-btn {
            flex: 1; /* スマホで均等に幅を分ける */
            background: var(--tab-inactive);
            color: #b8a8c0;
            border: none;
            padding: 12px 8px; /* 左右の余白を減らして文字落ちを防ぐ */
            font-size: 14px;
            font-weight: bold;
            border-radius: 12px 12px 0 0;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            white-space: nowrap;
            -webkit-tap-highlight-color: transparent;
        }

        .tab-btn:hover {
            color: #fff;
        }

        .tab-btn.active {
            background: var(--pastel-red);
            color: #3a1f2a;
            box-shadow: 0 0 12px var(--pastel-red-glow);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* メインレイアウト */
        .main-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        @media (max-width: 800px) {
            .main-layout {
                grid-template-columns: 1fr;
                gap: 20px;
            }
        }

        /* ルーレット盤エリア */
        .roulette-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
        }

        .canvas-container {
            position: relative;
            width: 100%;
            max-width: 320px; /* スマホに合わせたサイズに微調整 */
            aspect-ratio: 1 / 1;
            margin-bottom: 20px;
        }

        /* 上部の固定矢印 */
        .roulette-arrow {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 25px solid #fff;
            z-index: 10;
            filter: drop-shadow(0 2px 8px rgba(255,143,171,0.5));
        }

        canvas {
            width: 100% !important;
            height: 100% !important;
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(0,0,0,0.5), 0 0 16px rgba(255,143,171,0.18), inset 0 0 0 4px rgba(255,255,255,0.06);
        }

        /* 操作系 */
        .control-panel {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }

        .setting-box {
            background: #35293f;
            padding: 12px 15px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.06);
        }

        .setting-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 13px;
            gap: 10px;
        }
        
        .setting-row span {
            line-height: 1.4;
        }

        /* トグルスイッチ */
        .switch {
            position: relative;
            display: inline-block;
            width: 46px;
            height: 24px;
            flex-shrink: 0;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #46384f;
            transition: .2s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px; width: 16px;
            left: 4px; bottom: 4px;
            background-color: #fff4e0;
            transition: .2s;
            border-radius: 50%;
        }

        input:checked + .slider { background: linear-gradient(135deg, var(--pastel-red), var(--lavender)); }
        input:checked + .slider:before {
            transform: translateX(22px);
            background-color: #3a1f2a;
        }

        .btn-start {
            width: 100%;
            padding: 14px 10px;
            font-size: 16px;
            font-weight: bold;
            background: linear-gradient(135deg, var(--pastel-red), var(--lavender));
            color: #3a1f2a;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 16px var(--pastel-red-glow);
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-start:hover:not(:disabled) {
            filter: brightness(1.1);
            box-shadow: 0 6px 22px rgba(201,168,255,0.45);
            transform: translateY(-1px);
        }

        .btn-start:disabled {
            background: #46384f !important;
            color: #877a8e !important;
            cursor: not-allowed;
            box-shadow: none !important;
        }

        /* 追加式の記入欄 */
        .inputs-panel {
            background: #35293f;
            padding: 15px 12px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.06);
            display: flex;
            flex-direction: column;
            max-height: 520px;
        }

        @media (max-width: 800px) {
            .inputs-panel {
                max-height: none; /* スマホ時はスクロールのバッティングを防ぐため制限解除 */
            }
        }

        .inputs-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-size: 15px;
            font-weight: bold;
        }

        .input-scroll-area {
            overflow-y: auto;
            flex: 1;
            padding-right: 2px;
            margin-bottom: 12px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px dashed #4f3f5a;
            width: 100%;
        }

        .input-top-row {
            display: flex;
            align-items: center;
            gap: 6px;
            width: 100%;
        }

        .input-num {
            font-size: 12px;
            color: #b8a8c0;
            width: 18px;
            text-align: right;
            flex-shrink: 0;
        }

        .penalty-select, .penalty-input {
            background: #1c1620;
            border: 1px solid #4f3f5a;
            color: #fff;
            padding: 8px 6px; /* パディングを狭めてはみ出し防止 */
            border-radius: 10px;
            font-size: 13px;
            min-width: 0; /* フレックスコンテナ内での縮小を許可 */
        }

        .penalty-select {
            flex: 1;
            cursor: pointer;
        }

        .penalty-input {
            flex: 1.4;
            width: 100%;
        }

        .penalty-input:focus, .penalty-select:focus {
            border-color: var(--pastel-red);
            outline: none;
            box-shadow: 0 0 6px var(--pastel-red-glow);
        }

        .btn-delete {
            background: none;
            border: 1px solid #5a4a64;
            color: #c4b4cc;
            padding: 8px 10px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            flex-shrink: 0;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-delete:hover {
            border-color: var(--danger-color);
            color: var(--danger-color);
        }

        /* 下段プリセットレイアウトのスマホ最適化 */
        .preset-sub-row {
            display: flex;
            gap: 6px;
            margin-left: 24px;
            align-items: center;
            flex-wrap: wrap; /* 画面幅に合わせて折り返す */
            width: calc(100% - 24px);
        }

        .food-name-input {
            width: 80px;
            background: #1c1620;
            border: 1px solid #6c587b;
            color: #fff;
            padding: 6px 8px;
            border-radius: 8px;
            font-size: 13px;
            flex-grow: 1;
            min-width: 60px;
        }

        @media (max-width: 400px) {
            .preset-sub-row {
                display: grid;
                grid-template-columns: auto 1fr auto; /* 超小型画面で横一列を綺麗に収める */
                align-items: center;
            }
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        .btn-action {
            flex: 1;
            padding: 12px 8px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            border: none;
            text-align: center;
            white-space: nowrap;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-add {
            background-color: #3a2c44;
            color: var(--pastel-red);
            border: 1px solid var(--pastel-red);
        }
        .btn-add:hover:not(:disabled) {
            background: linear-gradient(135deg, var(--pastel-red), var(--lavender));
            color: #3a1f2a;
        }
        .btn-add:disabled {
            border-color: #4f3f5a;
            color: #877a8e;
            cursor: not-allowed;
        }

        .btn-clear {
            background-color: transparent;
            color: var(--danger-color);
            border: 1px solid var(--danger-color);
        }
        .btn-clear:hover {
            background-color: var(--danger-color);
            color: #3a1f2a;
        }

        /* 統計・ログタブレイアウト */
        .stats-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
        }
        .stats-layout .stats-box:last-child {
            grid-column: 1 / -1;
        }

        @media (max-width: 600px) {
            .stats-layout {
                grid-template-columns: 1fr;
            }
        }

        .stats-box {
            background: #35293f;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px;
            padding: 15px;
            max-height: 350px;
            overflow-y: auto;
            width: 100%;
        }

        .stats-box h3 {
            margin-top: 0;
            margin-bottom: 12px;
            font-size: 15px;
            border-bottom: 1px solid #4f3f5a;
            padding-bottom: 6px;
            color: #fff;
        }

        .stats-list, .log-list {
            list-style: none;
            padding: 0;
            margin: 0;
            font-size: 13px;
        }

        .stats-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px dashed #4f3f5a;
            gap: 10px;
        }

        .log-item {
            padding: 6px 0;
            color: #d8c8e0;
            border-bottom: 1px dashed #4f3f5a;
        }

        /* ポップアップ表示用オーバーレイ (結果表示用) */
        .result-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s;
        }
        .result-overlay.active {
            visibility: visible;
            opacity: 1;
        }
        .result-card {
            background: var(--container-bg);
            border: 2px solid var(--pastel-red);
            padding: 25px 20px;
            border-radius: 22px;
            text-align: center;
            max-width: 450px;
            width: 88%;
            box-shadow: 0 0 36px var(--pastel-red-glow);
            position: relative;
            overflow: hidden;
        }
        .result-card h2 {
            margin: 0 0 15px 0;
            font-size: 15px;
            color: #c9a8ff;
            letter-spacing: 0.1em;
        }
        .result-text {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 25px;
            word-break: break-all;
            text-shadow: 0 0 10px rgba(255,255,255,0.25);
            line-height: 1.4;
        }
        .btn-close-result {
            background: linear-gradient(135deg, var(--pastel-red), var(--lavender));
            color: #3a1f2a;
            border: none;
            padding: 12px 35px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            position: relative;
            z-index: 2;
            font-size: 14px;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-close-result:hover { filter: brightness(1.1); }

        /* 結果ポップアップ用の紙吹雪パーティクル */
        .confetti-piece {
            position: absolute;
            top: -10%;
            border-radius: 2px;
            opacity: 0.9;
            animation: confetti-fall linear forwards;
            pointer-events: none;
            z-index: 1;
        }
        @keyframes confetti-fall {
            to {
                transform: translateY(420px) rotate(540deg);
                opacity: 0;
            }
        }

        /* カスタムモーダル（リセット選択用） */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s;
        }
        .modal.active { visibility: visible; opacity: 1; }
        .modal-content {
            background: var(--container-bg);
            border: 1px solid var(--danger-color);
            padding: 25px 20px;
            border-radius: 18px;
            max-width: 500px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            text-align: center;
            box-shadow: 0 0 24px rgba(255, 138, 122, 0.25);
        }
        .modal h2 { margin-top: 0; font-size: 18px; color: var(--danger-color); }
        .modal p { font-size: 14px; line-height: 1.5; margin-bottom: 20px; }
        .btn-modal-confirm {
            background: var(--danger-color);
            color: #3a1f2a;
            border: none;
            padding: 12px 28px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            width: 100%;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-modal-confirm:hover { background: #ffb4a2; }
    </style>
</head>
<body>

<div class="container">
    <h1>💀 罰ゲームルーレット<br><span style="font-size: 0.8em; font-weight: normal;">(リセット機能付き)</span></h1>
    
    <div class="tab-menu">
        <button class="tab-btn active" onclick="switchTab('main-tab', this)">メインルーレット</button>
        <button class="tab-btn" onclick="switchTab('stats-tab', this)">データ・履歴ログ</button>
    </div>

    <div id="main-tab" class="tab-content active">
        <div class="main-layout">
            
            <div class="roulette-wrapper">
                <div class="canvas-container">
                    <div class="roulette-arrow"></div>
                    <canvas id="rouletteCanvas" width="340" height="340"></canvas>
                </div>
                
                <div class="control-panel">
                    <div class="setting-box">
                        <div class="setting-row">
                            <span>🔄 リセット項目を混ぜる<br><small style="color: #b8a8c0;">（当選確率: 1枠分）</small></span>
                            <label class="switch">
                                <input type="checkbox" id="resetToggle" checked onchange="saveToggleSetting(); syncRouletteWheel();">
                                <span class="slider"></span>
                            </label>
                        </div>
                    </div>
                    <button class="btn-start" id="btnStart" onclick="spinWheel()">ルーレットを回す！</button>
                    <button class="btn-start" id="btnStart10" onclick="startMultiSpin(10)" style="margin-top:4px; background: linear-gradient(135deg, var(--lavender), var(--pastel-red));">🔥 10連続で回す！</button>
                    <div id="multiSpinStatus" style="display:none; text-align:center; font-size:13px; color:#c9a8ff; margin-top:4px;"></div>
                </div>
            </div>

            <div class="inputs-panel">
                <div class="inputs-header">
                    <span>📝 項目リスト (<span id="currentCount">0</span>/50)</span>
                </div>
                
                <div class="input-scroll-area" id="inputContainer">
                </div>

                <div class="action-buttons">
                    <button class="btn-action btn-add" id="btnAddField" onclick="addField()">＋ 項目を追加</button>
                    <button class="btn-action btn-clear" onclick="clearAllFields()">すべてクリア</button>
                </div>
            </div>

        </div>
    </div>

    <div id="stats-tab" class="tab-content">
        <div class="stats-layout">
            <div class="stats-box">
                <h3>📊 累計当選数</h3>
                <div id="statsList" class="stats-list">まだ当選データがありません</div>
            </div>
            <div class="stats-box">
                <h3>🧮 累計値</h3>
                <div id="cumulativeList" class="stats-list">まだ累計データがありません</div>
            </div>
            <div class="stats-box">
                <h3>📜 履歴ログ</h3>
                <div id="logList" class="log-list">履歴はありません</div>
            </div>
        </div>
    </div>
</div>

<div class="result-overlay" id="resultOverlay">
    <div class="result-card">
        <h2>抽選結果</h2>
        <div class="result-text" id="resultText">---</div>
        <button class="btn-close-result" onclick="closeResultPopup()">閉じる</button>
    </div>
</div>

<div class="modal" id="resetModal">
    <div class="modal-content">
        <h2>🔄 リセット条件発動！</h2>
        <p>「リセット」が当選しました。<br>累計値をすべて0にリセットします。</p>
        <button class="btn-modal-confirm" onclick="executeReset()">累計値をリセットして閉じる</button>
    </div>
</div>

<script>
let itemsList = []; 
let stats = {};
let logs = [];
let cumulativeLogs = []; 

// ルーレット制御用変数
const canvas = document.getElementById('rouletteCanvas');
const ctx = canvas.getContext('2d');
let currentAngle = 0; 
let isSpinning = false;
let currentPool = []; 

// パステル系のグラデーション用シードカラー
const colors = ['#4a3a56', '#5a3f5e', '#3f3a52', '#4f3a4a', '#3a3a52', '#523f4f'];

// プリセット用データ定義
const PRESET_OPTIONS = ['ご自愛', '禁煙', '禁酒', '〇〇を食べる'];
const TIME_PRESETS = ['1時間', '2時間', '5時間', '10時間', '1日'];
const COUNT_PRESETS = ['1個', '2個', '3個', '5個', '10個'];

window.onload = function() {
    loadSavedData();
    if(itemsList.length === 0) {
        addField();
        addField();
        addField();
    }
    syncRouletteWheel();
};

// タブ切り替え
function switchTab(tabId, btn) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
    
    document.getElementById(tabId).classList.add('active');
    btn.classList.add('active');

    if(tabId === 'main-tab') {
        syncRouletteWheel();
    }
}

// 項目を追加 (最大50個)
function addField() {
    if (itemsList.length >= 50) return;

    const id = Date.now() + Math.random();
    itemsList.push({ 
        id: id, 
        mode: 'custom', 
        presetType: 'ご自愛', 
        value: '', 
        foodName: 'プリン' 
    });

    renderFields();
    saveItems();
    syncRouletteWheel();
}

// 項目を削除
function deleteField(id) {
    itemsList = itemsList.filter(item => item.id !== id);
    renderFields();
    saveItems();
    syncRouletteWheel();
}

// アイテムのオブジェクトから実際の表示テキストを生成する関数
function getItemText(item) {
    if (item.mode === 'custom') {
        return item.value;
    } else {
        if (item.presetType === '〇〇を食べる') {
            return `${item.foodName || '〇〇'}を${item.value}食べる`;
        } else {
            return `${item.presetType}${item.value}`;
        }
    }
}

// 記入欄のレンダリング
function renderFields() {
    const container = document.getElementById('inputContainer');
    container.innerHTML = '';

    itemsList.forEach((item, index) => {
        const group = document.createElement('div');
        group.className = 'input-group';

        const topRow = document.createElement('div');
        topRow.className = 'input-top-row';

        const num = document.createElement('span');
        num.className = 'input-num';
        num.innerText = index + 1;
        topRow.appendChild(num);

        const modeSelect = document.createElement('select');
        modeSelect.className = 'penalty-select';
        
        const optCustom = document.createElement('option');
        optCustom.value = 'custom';
        optCustom.innerText = '✍️ 自由入力';
        if(item.mode === 'custom') optCustom.selected = true;
        modeSelect.appendChild(optCustom);

        PRESET_OPTIONS.forEach(p => {
            const opt = document.createElement('option');
            opt.value = p;
            opt.innerText = `🎁 ${p}`;
            if(item.mode === 'preset' && item.presetType === p) opt.selected = true;
            modeSelect.appendChild(opt);
        });

        modeSelect.onchange = function(e) {
            const val = e.target.value;
            if(val === 'custom') {
                item.mode = 'custom';
                item.value = '';
            } else {
                item.mode = 'preset';
                item.presetType = val;
                item.value = (val === '〇〇を食べる') ? COUNT_PRESETS[0] : TIME_PRESETS[0];
            }
            renderFields();
            saveItems();
            syncRouletteWheel();
        };
        topRow.appendChild(modeSelect);

        if (item.mode === 'custom') {
            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'penalty-input';
            input.value = item.value;
            input.placeholder = '空欄（はずれ）';
            input.oninput = function(e) {
                item.value = e.target.value;
                saveItems();
                syncRouletteWheel();
            };
            topRow.appendChild(input);
        } else {
            const valueSelect = document.createElement('select');
            valueSelect.className = 'penalty-input';
            const currentSubPresets = (item.presetType === '〇〇を食べる') ? COUNT_PRESETS : TIME_PRESETS;
            
            currentSubPresets.forEach(v => {
                const opt = document.createElement('option');
                opt.value = v;
                opt.innerText = v;
                if(item.value === v) opt.selected = true;
                valueSelect.appendChild(opt);
            });

            valueSelect.onchange = function(e) {
                item.value = e.target.value;
                saveItems();
                syncRouletteWheel();
            };
            topRow.appendChild(valueSelect);
        }

        const btnDel = document.createElement('button');
        btnDel.className = 'btn-delete';
        btnDel.innerText = '×';
        btnDel.onclick = function() { deleteField(item.id); };
        topRow.appendChild(btnDel);

        group.appendChild(topRow);

        if (item.mode === 'preset' && item.presetType === '〇〇を食べる') {
            const subRow = document.createElement('div');
            subRow.className = 'preset-sub-row';
            
            const labelText = document.createElement('span');
            labelText.style.fontSize = '12px';
            labelText.style.color = '#b8a8c0';
            labelText.innerText = '対象 ➔';
            subRow.appendChild(labelText);

            const foodInput = document.createElement('input');
            foodInput.type = 'text';
            foodInput.className = 'food-name-input';
            foodInput.value = item.foodName || 'プリン';
            foodInput.placeholder = 'プリン';
            foodInput.oninput = function(e) {
                item.foodName = e.target.value;
                saveItems();
                syncRouletteWheel();
            };
            subRow.appendChild(foodInput);

            const tailText = document.createElement('span');
            tailText.style.fontSize = '12px';
            tailText.style.color = '#b8a8c0';
            tailText.innerText = 'を食べる';
            subRow.appendChild(tailText);

            group.appendChild(subRow);
        }

        container.appendChild(group);
    });

    document.getElementById('currentCount').innerText = itemsList.length;
    document.getElementById('btnAddField').disabled = itemsList.length >= 50;
}

function clearAllFields() {
    if(confirm('すべての記入欄を削除してもよろしいですか？')) {
        itemsList = [];
        renderFields();
        saveItems();
        syncRouletteWheel();
    }
}

function syncRouletteWheel() {
    currentPool = [];
    
    itemsList.forEach((item) => {
        const val = getItemText(item).trim();
        if (val !== '') {
            currentPool.push({ type: 'penalty', name: val, originId: item.id });
        } else {
            currentPool.push({ type: 'miss', name: '❌ はずれ' });
        }
    });

    if (currentPool.length === 0) {
        currentPool.push({ type: 'miss', name: '❌ はずれ' });
    }

    const isResetAvailable = document.getElementById('resetToggle').checked;
    if (isResetAvailable) {
        currentPool.push({ type: 'reset', name: '🔄 リセット発動！' });
    }

    drawWheel(currentAngle);
}

function drawWheel(angle) {
    const numSegments = currentPool.length;
    const arc = (2 * Math.PI) / numSegments;
    const radius = canvas.width / 2;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let i = 0; i < numSegments; i++) {
        const segmentAngle = angle + (i * arc);
        
        ctx.beginPath();
        if (currentPool[i].type === 'reset') {
            ctx.fillStyle = '#ffb4a2'; 
        } else if (currentPool[i].type === 'miss') {
            ctx.fillStyle = '#3a2c44'; 
        } else {
            ctx.fillStyle = colors[i % colors.length];
        }
        
        ctx.moveTo(radius, radius);
        ctx.arc(radius, radius, radius - 5, segmentAngle, segmentAngle + arc);
        ctx.lineTo(radius, radius);
        ctx.fill();
        
        ctx.strokeStyle = 'rgba(255, 143, 171, 0.18)';
        ctx.lineWidth = 1;
        ctx.stroke();

        ctx.save();
        if (currentPool[i].type === 'reset') {
            ctx.fillStyle = '#3a1f2a';
        } else if (currentPool[i].type === 'miss') {
            ctx.fillStyle = '#8a7a96';
        } else {
            ctx.fillStyle = '#ffe3ea';
        }
        
        ctx.translate(radius, radius);
        ctx.rotate(segmentAngle + arc / 2);
        ctx.font = 'bold 12px sans-serif';
        ctx.textAlign = 'right';
        
        let text = currentPool[i].name;
        if(text.length > 12) text = text.substring(0, 11) + '...';
        
        ctx.fillText(text, radius - 20, 5);
        ctx.restore();
    }

    ctx.beginPath();
    ctx.arc(radius, radius, 15, 0, 2 * Math.PI);
    ctx.fillStyle = '#fff4e0';
    ctx.strokeStyle = varColor('--pastel-red');
    ctx.lineWidth = 3;
    ctx.fill();
    ctx.stroke();
}

function varColor(varName) {
    return getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
}

let multiSpinRemaining = 0;
let multiSpinTotal = 0;
let resetPending = false;

function startMultiSpin(count) {
    if (isSpinning || multiSpinRemaining > 0) return;
    multiSpinRemaining = count;
    multiSpinTotal = count;
    document.getElementById('btnStart10').disabled = true;
    updateMultiSpinStatus();
    spinWheel();
}

function updateMultiSpinStatus() {
    const statusEl = document.getElementById('multiSpinStatus');
    if (multiSpinRemaining > 0) {
        statusEl.style.display = 'block';
        statusEl.innerText = `🎯 残り ${multiSpinRemaining} 回`;
    } else {
        statusEl.style.display = 'none';
    }
}

function spinWheel() {
    if (isSpinning) return;

    isSpinning = true;
    document.getElementById('btnStart').disabled = true;
    document.getElementById('btnStart10').disabled = true;

    const numSegments = currentPool.length;
    const targetIndex = Math.floor(Math.random() * numSegments);
    const arc = (2 * Math.PI) / numSegments;
    
    const targetAngle = -Math.PI / 2 - (targetIndex * arc) - (arc / 2);
    const finalAngle = targetAngle - (Math.PI * 2 * 6); 
    
    let startTimestamp = null;
    const duration = multiSpinRemaining > 0 ? 1200 : 4000; 

    function animate(timestamp) {
        if (!startTimestamp) startTimestamp = timestamp;
        const elapsed = timestamp - startTimestamp;
        const progress = Math.min(elapsed / duration, 1);

        const easeOut = 1 - Math.pow(1 - progress, 3);
        
        currentAngle = easeOut * finalAngle;
        drawWheel(currentAngle);

        if (progress < 1) {
            requestAnimationFrame(animate);
        } else {
            isSpinning = false;
            document.getElementById('btnStart').disabled = false;
            if (multiSpinRemaining === 0) document.getElementById('btnStart10').disabled = false;
            
            const result = currentPool[targetIndex];
            showResultPopup(result);
            processResult(result);
        }
    }

    requestAnimationFrame(animate);
}

function showResultPopup(result) {
    const overlay = document.getElementById('resultOverlay');
    const txt = document.getElementById('resultText');
    const titleEl = document.querySelector('.result-card h2');
    txt.innerText = result.name;

    if (multiSpinRemaining > 0) {
        const total = multiSpinTotal;
        const current = total - multiSpinRemaining + 1;
        titleEl.innerText = `抽選結果（${current}/${total}回目）`;
    } else {
        titleEl.innerText = '抽選結果';
    }

    overlay.classList.add('active');
    spawnConfetti();
}

function spawnConfetti() {
    const card = document.querySelector('.result-card');
    card.querySelectorAll('.confetti-piece').forEach(el => el.remove());

    const confettiColors = ['#ff8fab', '#c9a8ff', '#fff4e0', '#ffb4a2', '#a8e6cf'];
    const pieceCount = 24;

    for (let i = 0; i < pieceCount; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        const size = 6 + Math.random() * 6;
        piece.style.width = `${size}px`;
        piece.style.height = `${size * 0.4}px`;
        piece.style.left = `${Math.random() * 100}%`;
        piece.style.background = confettiColors[Math.floor(Math.random() * confettiColors.length)];
        piece.style.animationDuration = `${1.4 + Math.random() * 1.2}s`;
        piece.style.animationDelay = `${Math.random() * 0.3}s`;
        card.appendChild(piece);
    }
}

const TIME_UNIT_TO_HOURS = {
    'h': 1, '時間': 1,
    '日': 24,
    '分': 1 / 60, 'm': 1 / 60, 'min': 1 / 60
};

function parseAmount(text) {
    const normalized = text
        .replace(/[ｈＨ]/g, 'h')
        .replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0));
    
    const cleanText = normalized.replace('を食べる', '');
    const match = cleanText.match(/(\d+(?:\.\d+)?)\s*(時間|日|分|h|min|m|回|個|点|本|枚|杯|分間)/);
    if (!match) return null;
    const num = parseFloat(match[1]);
    const unit = match[2];
    const isTime = Object.prototype.hasOwnProperty.call(TIME_UNIT_TO_HOURS, unit);
    
    let label = normalized.replace(match[0], '').replace('を食べる', '').trim();
    if (!label) label = normalized;
    return { num, unit, isTime, label };
}

function closeResultPopup() {
    document.getElementById('resultOverlay').classList.remove('active');
    if (resetPending) {
        resetPending = false;
        return; 
    }
    advanceMultiSpin();
}

function advanceMultiSpin() {
    if (multiSpinRemaining > 0) {
        multiSpinRemaining--;
        updateMultiSpinStatus();
        if (multiSpinRemaining > 0) {
            setTimeout(() => spinWheel(), 400);
        } else {
            multiSpinTotal = 0;
            document.getElementById('btnStart10').disabled = false;
        }
    }
}

function processResult(result) {
    stats[result.name] = (stats[result.name] || 0) + 1;
    localStorage.setItem('canvasRouletteStats_v3', JSON.stringify(stats));

    const now = new Date();
    const timeStr = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;
    logs.unshift(`[${timeStr}] ${result.name}`);
    if (logs.length > 100) logs.pop();
    localStorage.setItem('canvasRouletteLogs_v3', JSON.stringify(logs));

    if (result.type === 'penalty') {
        const parsed = parseAmount(result.name);
        if (parsed) {
            cumulativeLogs.push({
                id: Date.now() + Math.random(),
                name: result.name,
                num: parsed.num,
                unit: parsed.unit,
                isTime: parsed.isTime,
                label: parsed.label,
                timestamp: timeStr
            });
            localStorage.setItem('canvasCumulativeLogs_v3', JSON.stringify(cumulativeLogs));
        }
    }

    updateStatsDisplay();
    updateLogDisplay();

    if (result.type === 'reset') {
        resetPending = true;
        setTimeout(() => {
            openResetModal();
        }, 600);
    }
}

// モーダルを開く
function openResetModal() {
    const modal = document.getElementById('resetModal');
    modal.classList.add('active');
}

// リセット実行
function executeReset() {
    cumulativeLogs = [];
    localStorage.setItem('canvasCumulativeLogs_v3', JSON.stringify(cumulativeLogs));
    updateStatsDisplay();

    document.getElementById('resetModal').classList.remove('active');
    advanceMultiSpin();
}

function saveItems() {
    localStorage.setItem('rouletteItemsList_v3', JSON.stringify(itemsList));
}

function saveToggleSetting() {
    const toggle = document.getElementById('resetToggle').checked;
    localStorage.setItem('canvasResetToggle_v3', toggle);
}

function loadSavedData() {
    const savedItems = localStorage.getItem('rouletteItemsList_v3');
    if (savedItems) {
        itemsList = JSON.parse(savedItems);
        renderFields();
    }

    const savedToggle = localStorage.getItem('canvasResetToggle_v3');
    if (savedToggle !== null) {
        document.getElementById('resetToggle').checked = savedToggle === 'true';
    }

    const savedStats = localStorage.getItem('canvasRouletteStats_v3');
    if (savedStats) stats = JSON.parse(savedStats);
    
    const savedLogs = localStorage.getItem('canvasRouletteLogs_v3');
    if (savedLogs) logs = JSON.parse(savedLogs);

    const savedCumulative = localStorage.getItem('canvasCumulativeLogs_v3');
    if (savedCumulative) cumulativeLogs = JSON.parse(savedCumulative);

    updateStatsDisplay();
    updateLogDisplay();
}

function updateStatsDisplay() {
    const container = document.getElementById('statsList');
    const cumulativeContainer = document.getElementById('cumulativeList');
    const filteredStats = Object.entries(stats).filter(([key]) => key !== '❌ はずれ');

    if (filteredStats.length === 0) {
        container.innerText = 'まだ当選データがありません';
    } else {
        container.innerHTML = '';
        filteredStats.forEach(([key, count]) => {
            const item = document.createElement('div');
            item.className = 'stats-item';
            item.innerHTML = `<span>${key}</span><span>${count} 回</span>`;
            container.appendChild(item);
        });
    }

    if (cumulativeLogs.length === 0) {
        cumulativeContainer.innerText = 'まだ累計データがありません';
    } else {
        cumulativeContainer.innerHTML = '';

        const groups = {};
        cumulativeLogs.forEach(l => {
            if (!groups[l.label]) groups[l.label] = [];
            groups[l.label].push(l);
        });

        for (let label in groups) {
            const entries = groups[label];

            const timeEntries = entries.filter(l => l.isTime);
            const timeTotalHours = timeEntries.reduce((sum, l) => sum + l.num * TIME_UNIT_TO_HOURS[l.unit], 0);

            const otherTotals = {};
            entries.filter(l => !l.isTime).forEach(l => {
                otherTotals[l.unit] = (otherTotals[l.unit] || 0) + l.num;
            });

            let displayStr = '';
            if (timeTotalHours > 0) {
                const totalDisplay = timeTotalHours % 1 === 0 ? timeTotalHours : timeTotalHours.toFixed(2);
                displayStr = `合計${totalDisplay}時間`;
            }
            const otherStrs = Object.entries(otherTotals).map(([unit, num]) => `合計${num}${unit}`);
            if (otherStrs.length > 0) {
                displayStr = displayStr ? `${displayStr}、${otherStrs.join('、')}` : otherStrs.join('、');
            }

            const item = document.createElement('div');
            item.className = 'stats-item';
            item.innerHTML = `<span>${label}</span><span>${displayStr}</span>`;
            cumulativeContainer.appendChild(item);
        }
    }
}

function updateLogDisplay() {
    const container = document.getElementById('logList');
    if (logs.length === 0) {
        container.innerText = '履歴はありません';
        return;
    }
    container.innerHTML = '';
    logs.forEach(log => {
        const item = document.createElement('div');
        item.className = 'log-item';
        item.innerText = log;
        container.appendChild(item);
    });
}
